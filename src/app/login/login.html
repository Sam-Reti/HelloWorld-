<div class="hero-wrapper">
  <app-background-image></app-background-image>
  <app-external-nav></app-external-nav>

  <div class="title-text">Welcome Back</div>
  <div class="loginCard">
    <h2>HelloWorld;</h2>

    <input [(ngModel)]="email" placeholder="Email" (keydown.enter)="login()" />
    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
      (keydown.enter)="login()"
    />

    <button class="forgot-btn" type="button" (click)="openResetModal()">Forgot Password?</button>

    <button (click)="login()">Login</button>

    <div class="divider"><span>or</span></div>

    <button class="google-btn" (click)="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    @if (message) {
      <p class="message">{{ message }}</p>
    }

    <button class="resend-btn" (click)="resendVerification()">Resend verification email</button>
  </div>
</div>

@if (showResetModal) {
  <div class="reset-overlay" (click)="closeResetModal()">
    <div class="reset-modal" (click)="$event.stopPropagation()">
      <h3>Reset Password</h3>
      <p class="reset-body">Enter your email and we'll send you a reset link.</p>
      <input
        class="reset-input"
        [(ngModel)]="resetEmail"
        type="email"
        placeholder="Your email address"
        (keydown.enter)="submitReset()"
        autofocus
      />
      @if (resetError) {
        <p class="reset-error">{{ resetError }}</p>
      }
      <div class="reset-actions">
        <button class="reset-cancel" type="button" (click)="closeResetModal()">Cancel</button>
        <button class="reset-submit" type="button" (click)="submitReset()">Send Reset Link</button>
      </div>
    </div>
  </div>
}
