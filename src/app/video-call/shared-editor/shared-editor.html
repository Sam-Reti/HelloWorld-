<div class="shared-editor">
  <div class="editor-toolbar">
    <select
      class="language-select"
      [ngModel]="service.language()"
      (ngModelChange)="onLanguageChange($event)"
    >
      @for (lang of languages; track lang) {
        <option [value]="lang">{{ lang }}</option>
      }
    </select>
    <button
      class="run-btn"
      [disabled]="!canRun || running()"
      [title]="canRun ? 'Run (Ctrl+Enter)' : 'Run is only available for JavaScript and TypeScript'"
      (click)="runCode()"
    >
      @if (running()) {
        <span class="run-spinner"></span> Running...
      } @else {
        &#9654; Run
      }
    </button>
    <button class="close-btn" (click)="onClose()">Close</button>
  </div>
  <div class="editor-host" #editorHost></div>
  <app-console-output
    [entries]="consoleEntries()"
    [alwaysShow]="consoleEntries().length > 0"
    (cleared)="clearConsole()"
  />
</div>
