@if (videoCallService.activeCall(); as call) {
  <div class="call-overlay" [class.editor-open]="sharedEditorService.editorOpen()">
    <div class="call-content">
      <div class="video-panel">
        <hiyve-video-grid
          [localUserName]="videoCallService.localUserName"
          [layout]="'grid'"
          [showNames]="true"
          [colors]="{ background: '#0a0a14' }"
        />
      </div>
      @if (sharedEditorService.editorOpen()) {
        <div class="editor-panel">
          <app-shared-editor (close)="toggleEditor()" />
        </div>
      }
    </div>
    <div class="control-bar-wrap">
      <button class="toggle-editor-btn" (click)="toggleEditor()">
        {{ sharedEditorService.editorOpen() ? 'Hide Editor' : 'Code Together' }}
      </button>
      <hiyve-control-bar
        [showAudioToggle]="true"
        [showVideoToggle]="true"
        [showSettings]="true"
        [showLeaveButton]="true"
        [showLeaveConfirmation]="false"
        [colors]="controlBarColors"
        [styles]="controlBarStyles"
        (leave)="onLeaveCall()"
      />
    </div>

    @if (!hasConnected()) {
      <div class="call-connecting">
        <div class="connecting-avatar">
          {{ call.calleeName[0].toUpperCase() }}
        </div>
        <p class="connecting-name">{{ call.calleeName }}</p>
        <p class="connecting-label">Calling...</p>
        <div class="connecting-spinner"></div>
        <button class="cancel-btn" (click)="videoCallService.endCall()">Cancel</button>
      </div>
    }
  </div>
}

@if (showSaveModal()) {
  <app-save-code-modal
    [code]="savedCode()"
    [language]="savedLanguage()"
    (dismiss)="dismissSaveModal()"
  />
}
